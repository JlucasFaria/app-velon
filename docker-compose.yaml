name: app-velon

services:
  postgres:
    container_name: app-velon-db
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: $DATABASE_DB
      POSTGRES_USER: $DATABASE_USER
      POSTGRES_PASSWORD: $DATABASE_PASSWORD
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $DATABASE_USER -d $DATABASE_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
